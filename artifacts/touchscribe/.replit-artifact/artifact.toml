kind = "web"
previewPath = "/"
title = "TouchScribe"
version = "1.0.0"
id = "artifacts/touchscribe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18442

[services.development]
run = "pnpm --filter @workspace/touchscribe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/touchscribe", "run", "build" ]
publicDir = "artifacts/touchscribe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18442"
BASE_PATH = "/"
